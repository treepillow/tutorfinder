events {
    worker_connections 1024;
}

http {
    resolver 8.8.8.8 8.8.4.4;

    map $http_origin $cors_origin {
        default "";
        "https://www.tutorfinder.world" $http_origin;
        "https://tutorfinder.world" $http_origin;
        "https://tutorfinder-zeta.vercel.app" $http_origin;
    }

    server {
        listen 3000;

        location / {
            # Handle preflight OPTIONS separately
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' '3600' always;
                return 204;
            }

            proxy_pass https://personal-m9frao4j.outsystemscloud.com/BookingProcessLogic/rest/BookingProcessAPI$request_uri;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            proxy_ssl_session_reuse on;

            # Preserve headers and request body
            proxy_pass_request_headers on;
            proxy_buffering off;
            proxy_request_buffering off;

            # Hide upstream CORS headers to avoid conflicts
            proxy_hide_header 'Access-Control-Allow-Origin';
            proxy_hide_header 'Access-Control-Allow-Methods';
            proxy_hide_header 'Access-Control-Allow-Headers';

            # Set our own CORS Headers
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' '3600' always;
        }
    }
}
