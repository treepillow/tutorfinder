server.port=8080

# PostgreSQL (Supabase)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/postgres?currentSchema=payment_schema}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Disable server-side prepared statements (required for Supabase PgBouncer)
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=payment_schema
spring.jpa.open-in-view=false

# HikariCP connection pool - validate and refresh stale connections
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.auto-commit=true

# RabbitMQ
spring.rabbitmq.addresses=${RABBITMQ_URL:amqp://guest:guest@rabbitmq:5672/}

# Stripe
stripe.api.key=${STRIPE_SECRET_KEY:}

# Frontend URL for Stripe Checkout redirects
frontend.url=${FRONTEND_URL:http://localhost:5173}
