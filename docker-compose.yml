version: "3.9"

# ─── Shared network ──────────────────────────────────────────
networks:
  tutorfinder_net:
    driver: bridge

# ─── Named volumes ───────────────────────────────────────────
volumes:
  rabbitmq_data:

# ─── Services ────────────────────────────────────────────────
services:

  # ── RabbitMQ ─────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI  →  http://localhost:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - tutorfinder_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Profile Service ───────────────────────────────────────
  profile-service:
    build: ./backend/profile-service
    container_name: profile-service
    restart: unless-stopped
    environment:
      DATABASE_URL: ${SUPABASE_URL}
      DB_SCHEMA: profile_schema
      JWT_SECRET: esd-jwt-secret-2024
      MATCH_SERVICE_URL: http://match-service:5002
      AVAILABILITY_SERVICE_URL: http://availability-service:5003
    ports:
      - "5001:5001"
    networks:
      - tutorfinder_net

  # ── Match Service ─────────────────────────────────────────
  match-service:
    build: ./backend/match-service
    container_name: match-service
    restart: unless-stopped
    environment:
      DATABASE_URL: ${SUPABASE_URL}
      DB_SCHEMA: match_schema
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      PROFILE_SERVICE_URL: http://profile-service:5001
    ports:
      - "5002:5002"
    networks:
      - tutorfinder_net
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ── Availability Service ──────────────────────────────────
  availability-service:
    build: ./backend/availability-service
    container_name: availability-service
    restart: unless-stopped
    environment:
      DATABASE_URL: ${SUPABASE_URL}
      DB_SCHEMA: availability_schema
    ports:
      - "5003:5003"
    networks:
      - tutorfinder_net

  # ── Booking Service ───────────────────────────────────────
  booking-service:
    build: ./backend/booking-service
    container_name: booking-service
    restart: unless-stopped
    environment:
      DATABASE_URL: ${SUPABASE_URL}
      DB_SCHEMA: booking_schema
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      PROFILE_SERVICE_URL: http://profile-service:5001
    ports:
      - "5004:5004"
    networks:
      - tutorfinder_net
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ── Payment Service (Java / Spring Boot) ──────────────────
  payment-service:
    build: ./backend/payment-service
    container_name: payment-service
    restart: unless-stopped
    environment:
      DATABASE_URL: jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:5432/postgres?currentSchema=payment_schema&sslmode=require
      DB_USER: postgres.ciqeksmhuutrnvtdqnxc
      DB_PASSWORD: ${SUPABASE_PASSWORD}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    ports:
      - "8080:8080"
    networks:
      - tutorfinder_net
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ── Notification Service ──────────────────────────────────
  notification-service:
    build: ./backend/notification-service
    container_name: notification-service
    restart: unless-stopped
    environment:
      DATABASE_URL: ${SUPABASE_URL}
      DB_SCHEMA: notification_schema
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
    ports:
      - "5007:5007"
    networks:
      - tutorfinder_net
    depends_on:
      rabbitmq:
        condition: service_healthy
